name: CI

on:
  pull_request:
    branches:
      - dev
      - staging
      - prod

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kavira
          POSTGRES_PASSWORD: kavira
          POSTGRES_DB: kavira_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @kavira/api db:generate
        env:
          DATABASE_URL: postgresql://kavira:kavira@localhost:5432/kavira_test
      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://kavira:kavira@localhost:5432/kavira_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          NODE_ENV: test
