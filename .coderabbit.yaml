language: en
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  auto_review:
    enabled: true
    base_branches:
      - dev
      - staging
      - prod
  path_filters:
    - "!**/dist/**"
    - "!**/node_modules/**"
    - "!**/*.lock"
    - "!**/coverage/**"
    - "!**/.turbo/**"
  tools:
    eslint:
      enabled: true
    gitleaks:
      enabled: true
chat:
  auto_reply: true
